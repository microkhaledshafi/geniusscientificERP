<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Scientific ERP</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="app">

    <aside class="sidebar">
        <h2>Genius ERP</h2>

        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('stock')">Stock</button>
        <button onclick="showPage('customers')">Customers</button>
        <button onclick="showPage('billing')">Billing</button>
        <button onclick="showPage('payments')">Payments</button>
        <button onclick="showPage('reports')">Reports</button>
        <button onclick="showPage('settings')">Settings</button>

    </aside>

    <main>

        <section id="dashboard" class="page">
            <h1>Dashboard</h1>
        </section>

        <section id="stock" class="page" style="display:none">
            <h1>Stock Management</h1>
        </section>

        <section id="customers" class="page" style="display:none">
            <h1>Customers</h1>
        </section>

        <section id="billing" class="page" style="display:none">
            <h1>Billing</h1>
        </section>

        <section id="payments" class="page" style="display:none">
            <h1>Payments</h1>
        </section>

        <section id="reports" class="page" style="display:none">
            <h1>Reports</h1>
        </section>

        <section id="settings" class="page" style="display:none">
            <h1>Settings</h1>
        </section>

    </main>

</div>

<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/stock.js"></script>
<script src="js/customer.js"></script>
<script src="js/billing.js"></script>
<script src="js/payment.js"></script>
<script src="js/report.js"></script>

</body>
</html>
